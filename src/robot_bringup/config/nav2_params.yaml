amcl:
  ros__parameters:
    use_sim_time: False
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_link"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    laser_model_type: "likelihood_field"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 12.0
    laser_min_range: -1.0
    sigma_hit: 0.2
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    max_beams: 60
    max_particles: 2000
    min_particles: 500
    odom_frame_id: "odom"
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    pf_err: 0.05
    pf_z: 0.99
    robot_model_type: "nav2_amcl::OmniMotionModel"
    resample_interval: 1
    save_pose_rate: 0.5
    update_min_a: 0.15
    update_min_d: 0.2
    tf_broadcast: true
    transform_tolerance: 1.0  # 增加容忍度防止 Orin Nano 瞬时高负载导致的 TF 报错
    scan_topic: scan
    set_initial_pose: true
    initial_pose:
      x: -0.00937446 
      y: 0.0499356
      z: 0.0
      yaw: -0.0305176

