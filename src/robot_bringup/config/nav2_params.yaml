controller_server:
  ros__parameters:
    use_sim_time: False 
    controller_frequency: 20.0       # 【虚拟机减负】全局控制频率降为 10Hz，确保指令实时下达不卡顿
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 0.2
    
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 40                 # 【虚拟机减负】降低预测步数，减少轨迹长度计算量
      model_dt: 0.05
      batch_size: 800                # 【虚拟机减负】暴砍 75% 采样批次，防止遇人时 CPU 卡死
      iteration_count: 1
      v_std: [0.15, 0.1, 0.3]
      v_mag_std: [0.1, 0.1, 0.1]
      predict_cost: true
      reset_period: 1.0
      visualize: false # 实机运行关闭可视化以节省 CPU
      warm_start: true # 开启预热，提升连续帧性能
      motion_model: "Omni"
      vx_max: 0.3
      vx_min: -0.3
      vy_max: 0.2
      vy_min: -0.2
      wz_max: 1.2
      critics: ["ConstraintCritic", "CostCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic"]
      ConstraintCritic:
        enabled: true
        cost_weight: 4.0
      CostCritic:
        enabled: true
        cost_weight: 4.0
        critical_cost: 250.0 # 略微提升允许的碰撞成本阈值
        consider_footprint: false # 降低计算量
        collision_cost: 1000000.0
      GoalCritic:
        enabled: true
        goal_cost_weight: 5.0
      PathAlignCritic:
        enabled: true
        cost_weight: 5.0
        trajectory_point_step: 4 # 减小步长，提高对齐精度

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: False
      transform_tolerance: 0.6
      rolling_window: true
      width: 4 # 略微缩小窗口，减少内存开销
      height: 4
      resolution: 0.05
      robot_radius: 0.21
      plugins: ["obstacle_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.5
        inflation_radius: 0.8
      obstacle_layer: 
        plugin: "nav2_costmap_2d::ObstacleLayer" 
        enabled: True
        observation_sources: scan camera_scan
        scan:
          topic: /scan
          clearing: True
          marking: True
          data_type: "LaserScan"
          obstacle_max_range: 3.0
          raytrace_max_range: 3.5
        camera_scan:
          topic: /gemini335/depth/scan
          clearing: True
          marking: True
          data_type: "LaserScan"
          obstacle_max_range: 2.5
          obstacle_min_range: 0.1
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          expected_update_rate: 2.0
          observation_persistence: 0.5

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: False
      robot_radius: 0.22
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: False
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: False
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: False
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlanner2D"
      tolerance: 0.1                 
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 2.0
      cost_travel_multiplier: 1.5    
      use_final_approach_orientation: false
      smoother_max_iterations: 1000  

smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True
      interpolation_points: 20       

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.6
    use_sim_time: False
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.2
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

robot_state_publisher:
  ros__parameters:
    use_sim_time: False

waypoint_follower:
  ros__parameters:
    use_sim_time: False
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: False
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.3, 0.2, 1.2]    # 同步底层平滑限速
    min_velocity: [-0.3, -0.2, -1.2] 
    max_accel: [2.5, 2.5, 3.2]
    max_decel: [-2.5, -2.5, -3.2]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
