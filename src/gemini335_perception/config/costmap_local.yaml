costmap:
  costmap:
    ros__parameters:
      use_bond: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: base_footprint
      robot_base_frame: base_footprint
      use_sim_time: false
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      footprint: "[ [0.3, 0.3], [0.3, -0.3], [-0.3, -0.3], [-0.3, 0.3] ]"
      plugins: ["voxel_layer", "inflation_layer"]

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: true
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: camera_scan chassis_lidar
        
        # 1. Gemini 335 Camera LaserScan (Current)
        camera_scan:
          topic: /gemini335/depth/scan
          max_obstacle_height: 2.0
          min_obstacle_height: 0.05
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0

        # 2. Chassis LiDAR (Future / Parallel source)
        chassis_lidar:
          topic: /scan # 替换为您底盘雷达的实际话题
          max_obstacle_height: 0.3 # 底盘雷达通常安装在较低位置
          min_obstacle_height: 0.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 12.0
          raytrace_min_range: 0.0
          obstacle_max_range: 10.0
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
